<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  background:#000;
  font-family:system-ui, -apple-system, sans-serif;
  overflow-x:hidden;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("https://i.postimg.cc/zftsF9zk/e7dcfef42d98e0b70586f5b2ed59acbb.jpg");
  background-size:cover;
  background-position:center;
  filter:brightness(0.35) contrast(1.15);
  transform:scale(1.05);
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.95));
}

/* LOGO */
.logo{
  width:130px;
  height:130px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  padding:8px;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.logo img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(14px);
  transition:0.25s ease;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
  background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.2);
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:translateX(-100%);
}

.card:hover::after{
  transform:translateX(100%);
  transition:0.6s;
}

/* TEXT */
.title{
  letter-spacing:0.25em;
  font-weight:600;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<main class="relative z-10 max-w-3xl mx-auto px-6 py-16">

  <!-- LOGO -->
  <div class="flex justify-center mb-12">
    <div class="logo">
      <img src="https://i.postimg.cc/6pwxWrbJ/logo.png" alt="logo"/>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="space-y-4">

    <a href="https://t.me/toolssucionov"
       target="_blank" rel="noopener noreferrer"
       class="card block p-6 rounded-2xl">
      <div class="text-xl title">TOOLS</div>
      <div class="text-white/40 text-sm mt-1">OSINT tools & resources</div>
    </a>

    <a href="https://t.me/+HphbJWHr-Ag2MTFi"
       target="_blank" rel="noopener noreferrer"
       class="card block p-6 rounded-2xl">
      <div class="text-xl title">PROJECT</div>
      <div class="text-white/40 text-sm mt-1">Main OSINT channel</div>
    </a>

    <a href="https://teletype.in/@chartsapps/services"
       target="_blank" rel="noopener noreferrer"
       class="card block p-6 rounded-2xl">
      <div class="text-xl title">SERVICES</div>
      <div class="text-white/40 text-sm mt-1">Investigations & analytics</div>
    </a>

    <a href="https://t.me/+PKk_kU5Nv6E3Mzg6"
       target="_blank" rel="noopener noreferrer"
       class="card block p-6 rounded-2xl">
      <div class="text-xl title">FORUM</div>
      <div class="text-white/40 text-sm mt-1">Private community</div>
    </a>

    <a href="https://t.me/repsucionov"
       target="_blank" rel="noopener noreferrer"
       class="card block p-6 rounded-2xl">
      <div class="text-xl title">REVIEWS</div>
      <div class="text-white/40 text-sm mt-1">Reputation & feedback</div>
    </a>

  </div>

</main>

</body>
</html>
